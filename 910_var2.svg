<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500">
  <defs>
    <style>
      /* ═══════ BASE ═══════ */
      .bg { fill: #0D1117; }
      .bleed-line { stroke: #21262d; stroke-width: 1; opacity: 0; animation: fadeIn 1s ease-out 0.3s forwards; }
      .accent-bar { fill: #f59e0b; opacity: 0; animation: fadeIn 0.6s ease-out 0.8s forwards; }

      /* ═══════ CONCENTRIC CONTOUR FIELD (VOMERO-inspired) ═══════ */
      /* Two animations per ring: drawRing (once, on load) + ripple (infinite, staggered = traveling wave) */
      .ring {
        stroke: #F0EDE8;
        stroke-width: 2.5;
        fill: none;
        opacity: 0.14;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation:
          drawRing 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards,
          rippleAmber 9.5s ease-in-out infinite;
      }

      /* Ripple delays staggered by 0.22s so wave travels outward over ~3.3s, */
      /* then ~6.2s of idle before the next wave triggers. Feels like occasional pings. */
      .rg1  { animation-delay: 0.05s, 3.00s; }
      .rg2  { animation-delay: 0.12s, 3.22s; }
      .rg3  { animation-delay: 0.20s, 3.44s; }
      .rg4  { animation-delay: 0.28s, 3.66s; }
      .rg5  { animation-delay: 0.36s, 3.88s; }
      .rg6  { animation-delay: 0.45s, 4.10s; }
      .rg7  { animation-delay: 0.54s, 4.32s; }
      .rg8  { animation-delay: 0.64s, 4.54s; }
      .rg9  { animation-delay: 0.74s, 4.76s; }
      .rg10 { animation-delay: 0.84s, 4.98s; }
      .rg11 { animation-delay: 0.95s, 5.20s; }
      .rg12 { animation-delay: 1.06s, 5.42s; }
      .rg13 { animation-delay: 1.18s, 5.64s; }
      .rg14 { animation-delay: 1.30s, 5.86s; }
      .rg15 { animation-delay: 1.42s, 6.08s; }
      .rg16 { animation-delay: 1.55s, 6.30s; }

      /* ═══════ WORDMARK (nineten·o = 9·10·0 custom glyphs) ═══════ */
      .logo-wordmark {
        opacity: 0;
        animation: fadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
      }
      .logo-wordmark path { fill: #F0EDE8; }

      /* ═══════ PLANETS (orbit the wordmark "sun" along elliptical paths) ═══════ */
      .planet {
        opacity: 0;
        animation: fadeIn 1s ease-out 3s forwards;
      }

      /* ═══════ TAGLINE ═══════ */
      .tagline {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 18px; font-weight: 800; letter-spacing: 8px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 2s forwards;
      }
      .tagline-cross { fill: #f59e0b; }

      /* ═══════ TOP META ═══════ */
      .top-name {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 15px; font-weight: 800; letter-spacing: 6px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeIn 0.7s ease-out 0.5s forwards;
      }
      .top-coords {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 11px; font-weight: 500; letter-spacing: 2px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeInMuted 0.7s ease-out 0.7s forwards;
      }

      /* ═══════ STATUS ═══════ */
      .status-dot {
        fill: #3366FF;
        opacity: 0;
        animation: fadeIn 0.5s ease-out 1s forwards, statusPulse 1.8s ease-in-out 1s infinite;
      }
      .status-text {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 12px; font-weight: 800; letter-spacing: 4px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeIn 0.7s ease-out 1s forwards;
      }
      .status-sub {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 10px; font-weight: 500; letter-spacing: 2px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeInMuted 0.7s ease-out 1.2s forwards;
      }

      /* ═══════ SPINE MARGINALIA (rotated edge text) ═══════ */
      .spine {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 10px; font-weight: 700; letter-spacing: 6px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeInMuted 0.8s ease-out 2.3s forwards;
      }

      /* ═══════ REGISTRATION MARK (editorial signature) ═══════ */
      .reg-mark {
        stroke: #F0EDE8; stroke-width: 1; fill: none;
        opacity: 0;
        animation: fadeInMuted 0.6s ease-out 2.6s forwards;
      }
      .reg-label {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 9px; font-weight: 700; letter-spacing: 3px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeInMuted 0.6s ease-out 2.7s forwards;
      }

      /* ═══════ BOTTOM ═══════ */
      .divider { stroke: #21262d; stroke-width: 2; opacity: 0; animation: fadeIn 1s ease-out 2.1s forwards; }
      .now-label {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 11px; font-weight: 800; letter-spacing: 5px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeInMuted 0.6s ease-out 2.3s forwards;
      }
      .now-text {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 14px; font-weight: 600;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeIn 0.6s ease-out 2.4s forwards;
      }
      .quote {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 13px; font-weight: 500; font-style: italic;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeInMuted 0.6s ease-out 2.5s forwards;
      }
      .issue-num {
        font-family: 'JetBrains Mono','SF Mono',Consolas,monospace;
        font-size: 11px; font-weight: 800; letter-spacing: 4px;
        fill: #F0EDE8;
        opacity: 0;
        animation: fadeIn 0.6s ease-out 2.6s forwards;
      }

      /* ═══════ KEYFRAMES ═══════ */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeInMuted {
        from { opacity: 0; }
        to { opacity: 0.55; }
      }
      @keyframes drawRing {
        to { stroke-dashoffset: 0; }
      }
      /* Ripple pulse: short active window (~2s swell) + long idle (~7.5s) per ring. */
      /* With 9.5s cycle, ring sits at baseline for most of each cycle. */
      @keyframes rippleAmber {
        0%, 22%, 100% {
          opacity: 0.14;
          stroke: #F0EDE8;
          stroke-width: 2.5;
        }
        8% {
          opacity: 0.65;
          stroke: #f59e0b;
          stroke-width: 3.5;
        }
        18% {
          opacity: 0.22;
          stroke: #F0EDE8;
          stroke-width: 2.5;
        }
      }
      @keyframes statusPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </defs>

  <!-- ═══════ FOUNDATION ═══════ -->
  <rect class="bg" width="1600" height="500"/>

  <!-- Editorial bleed lines -->
  <line class="bleed-line" x1="60" y1="40" x2="1540" y2="40"/>
  <line class="bleed-line" x1="60" y1="480" x2="1540" y2="480"/>

  <!-- Amber accent bar (top-right signal) -->
  <rect class="accent-bar" x="1300" y="36" width="240" height="6"/>

  <!-- ═══════ CONCENTRIC CONTOUR FIELD (VOMERO background) ═══════ -->
  <!-- 16 concentric ovals, pathLength=100 normalizes draw-in animation, centered on viewBox center -->
  <ellipse class="ring rg1" cx="800" cy="250" rx="40"   ry="15"  pathLength="100"/>
  <ellipse class="ring rg2" cx="800" cy="250" rx="75"   ry="28"  pathLength="100"/>
  <ellipse class="ring rg3" cx="800" cy="250" rx="115"  ry="43"  pathLength="100"/>
  <ellipse class="ring rg4" cx="800" cy="250" rx="160"  ry="60"  pathLength="100"/>
  <ellipse class="ring rg5" cx="800" cy="250" rx="210"  ry="79"  pathLength="100"/>
  <ellipse class="ring rg6" cx="800" cy="250" rx="265"  ry="100" pathLength="100"/>
  <ellipse class="ring rg7" cx="800" cy="250" rx="325"  ry="122" pathLength="100"/>
  <ellipse class="ring rg8" cx="800" cy="250" rx="390"  ry="147" pathLength="100"/>
  <ellipse class="ring rg9" cx="800" cy="250" rx="460"  ry="173" pathLength="100"/>
  <ellipse class="ring rg10" cx="800" cy="250" rx="535"  ry="201" pathLength="100"/>
  <ellipse class="ring rg11" cx="800" cy="250" rx="615"  ry="231" pathLength="100"/>
  <ellipse class="ring rg12" cx="800" cy="250" rx="700"  ry="263" pathLength="100"/>
  <ellipse class="ring rg13" cx="800" cy="250" rx="790"  ry="297" pathLength="100"/>
  <ellipse class="ring rg14" cx="800" cy="250" rx="885"  ry="333" pathLength="100"/>
  <ellipse class="ring rg15" cx="800" cy="250" rx="985"  ry="370" pathLength="100"/>
  <ellipse class="ring rg16" cx="800" cy="250" rx="1090" ry="410" pathLength="100"/>

  <!-- ═══════ PLANETS (orbiting the 910 sun along actual ring paths) ═══════ -->
  <!-- Each planet rides exactly on one of the contour rings. Orbit ellipses match ring rx/ry. -->
  <!-- Mercury → rg2 (75, 28) · Earth → rg5 (210, 79) · Mars → rg8 (390, 147) · Jupiter → rg10 (535, 201) · Saturn → rg12 (700, 263) -->
  <defs>
    <path id="orbit-mercury" d="M 853 270 A 75 28 0 1 0 747 230 A 75 28 0 1 0 853 270 Z"/>
    <path id="orbit-earth"   d="M 652 306 A 210 79 0 1 0 948 194 A 210 79 0 1 0 652 306 Z"/>
    <path id="orbit-mars"    d="M 800 103 A 390 147 0 1 0 800 397 A 390 147 0 1 0 800 103 Z"/>
    <path id="orbit-jupiter" d="M 297 181 A 535 201 0 1 0 1303 319 A 535 201 0 1 0 297 181 Z"/>
    <path id="orbit-saturn"  d="M 1336 81 A 700 263 0 1 0 264 419 A 700 263 0 1 0 1336 81 Z"/>
  </defs>

  <!-- Mercury — fast inner, amber -->
  <circle class="planet" r="4" fill="#f59e0b">
    <animateMotion dur="9s" begin="3s" repeatCount="indefinite">
      <mpath href="#orbit-mercury"/>
    </animateMotion>
  </circle>

  <!-- Earth -->
  <circle class="planet" r="5" fill="#F0EDE8">
    <animateMotion dur="18s" begin="3s" repeatCount="indefinite">
      <mpath href="#orbit-earth"/>
    </animateMotion>
  </circle>

  <!-- Mars -->
  <circle class="planet" r="4" fill="#F0EDE8">
    <animateMotion dur="28s" begin="3s" repeatCount="indefinite">
      <mpath href="#orbit-mars"/>
    </animateMotion>
  </circle>

  <!-- Jupiter — biggest, slow -->
  <circle class="planet" r="8" fill="#F0EDE8">
    <animateMotion dur="48s" begin="3s" repeatCount="indefinite">
      <mpath href="#orbit-jupiter"/>
    </animateMotion>
  </circle>

  <!-- Saturn — outer, amber, slowest. Wrapped in a group so its ring travels with it. -->
  <g class="planet">
    <!-- Saturn's ring (amber ellipse around the planet body) -->
    <ellipse cx="0" cy="0" rx="14" ry="3.5" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="18" ry="4.5" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <!-- Saturn planet body -->
    <circle cx="0" cy="0" r="6" fill="#f59e0b"/>
    <animateMotion dur="70s" begin="3s" repeatCount="indefinite">
      <mpath href="#orbit-saturn"/>
    </animateMotion>
  </g>

  <!-- ═══════ TOP META ═══════ -->
  <text class="top-name" x="60" y="80">GRAY · GAN-ERDENE MISHIGSUREN</text>
  <text class="top-coords" x="60" y="100">ULAANBAATAR, MONGOLIA · 47.91°N 106.91°E · UTC+8</text>

  <!-- ═══════ STATUS (top-right) ═══════ -->
  <circle class="status-dot" cx="1385" cy="76" r="6"/>
  <text class="status-text" x="1400" y="81">LIVE · MMXXVI</text>
  <text class="status-sub" x="1540" y="100" text-anchor="end">FIG. 002 · CONTOUR EDITION</text>

  <!-- ═══════ REGISTRATION MARK (top-right corner, editorial signature) ═══════ -->
  <g transform="translate(1540, 140)">
    <circle class="reg-mark" cx="0" cy="0" r="8"/>
    <line class="reg-mark" x1="-14" y1="0" x2="14" y2="0"/>
    <line class="reg-mark" x1="0" y1="-14" x2="0" y2="14"/>
    <text class="reg-label" x="-22" y="4" text-anchor="end">REG</text>
  </g>

  <!-- ═══════ LEFT SPINE MARGINALIA (rotated vertical) ═══════ -->
  <text class="spine" transform="translate(36, 460) rotate(-90)">910.STUDIO · BRUTALIST EDITION · MMXXVI · UB MONGOLIA</text>

  <!-- ═══════ RIGHT SPINE MARGINALIA (rotated vertical) ═══════ -->
  <text class="spine" transform="translate(1564, 40) rotate(90)">INFRASTRUCTURE × CREATIVE · SOLE PROVIDER · UTC+8</text>

